<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - EduNova AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>👤 Student Profile</h1>
</header>

<section>

<img id="preview"
src="https://via.placeholder.com/150"
width="150"
height="150"
style="border-radius:50%;border:4px solid #2563eb;object-fit:cover;">

<br><br>

<input type="file" id="profilePhoto" accept="image/*">

<br><br>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>📱 Mobile:</b> <span id="mobile"></span></p>

<p><b>Status:</b> ✅ Active</p>
<p><b>Member Since:</b> 2026</p>
<p><b>Total Quizzes:</b> <span id="quiz">0</span></p>
<p><b>Highest Score:</b> <span id="score">0</span></p>
<p><b>Achievements:</b> 🏅 Beginner Learner</p>

<br>

<button onclick="window.location.href='editprofile.html'">
✏️ Edit Profile
</button>

<br><br>

<button onclick="alert('Coming Soon')">
🔒 Change Password
</button>

<br><br>

<a href="dashboard.html">
<button>🏠 Dashboard</button>
</a>

<button onclick="logout()">🚪 Logout</button>

</section>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBv6tzSmI1ksTMdXo4FffSuU6WuUN-qeHg",
  authDomain: "edunova-ai-c1c3e.firebaseapp.com",
  projectId: "edunova-ai-c1c3e",
  storageBucket: "edunova-ai-c1c3e.firebasestorage.app",
  messagingSenderId: "545878851507",
  appId: "1:545878851507:web:5abbcbe85be52f17b9d5c6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const snap = await getDoc(doc(db, "students", user.uid));

    if (snap.exists()) {

        const data = snap.data();

        document.getElementById("name").innerHTML = data.name;
        document.getElementById("email").innerHTML = data.email;
        document.getElementById("mobile").innerHTML = data.mobile;

    }

});

  </script>

<script src="script.js"></script>
<script type="module" src="firebase.js"></script>
</body>
</html>

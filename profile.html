<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile - EduNova AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>👤 Student Profile</h1>
</header>

<section>

<img id="preview"
src="https://via.placeholder.com/150"
width="150"
height="150"
style="border-radius:50%;border:4px solid #2563eb;object-fit:cover;">

<br><br>

<input type="file" id="profilePhoto" accept="image/*">

<br><br>

<p><b>Name:</b> <span id="name"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>📱 Mobile:</b> <span id="mobile"></span></p>

<p><b>Status:</b> ✅ Active</p>
<p><b>Member Since:</b> 2026</p>
<p><b>Total Quizzes:</b> <span id="quiz">0</span></p>
<p><b>Highest Score:</b> <span id="score">0</span></p>
<p><b>Achievements:</b> 🏅 Beginner Learner</p>

<br>

<button onclick="window.location.href='editprofile.html'">
✏️ Edit Profile
</button>

<br><br>

<button onclick="alert('Coming Soon')">
🔒 Change Password
</button>

<br><br>

<a href="dashboard.html">
<button>🏠 Dashboard</button>
</a>

<button onclick="logout()">🚪 Logout</button>

</section>

<script src="script.js"></script>

<script>

document.getElementById("name").innerHTML =
localStorage.getItem("studentName") || "Student";

document.getElementById("email").innerHTML =
localStorage.getItem("studentEmail") || "-";

document.getElementById("mobile").innerHTML =
localStorage.getItem("studentMobile") || "-";

document.getElementById("score").innerHTML =
localStorage.getItem("quizScore") || "0";

let saved = localStorage.getItem("profilePhoto");

if(saved){
document.getElementById("preview").src = saved;
}

document.getElementById("profilePhoto").addEventListener("change",function(){

let file=this.files[0];

if(!file) return;

let reader=new FileReader();

reader.onload=function(e){

document.getElementById("preview").src=e.target.result;

localStorage.setItem("profilePhoto",e.target.result);

};

reader.readAsDataURL(file);

});

</script>

</body>
</html>

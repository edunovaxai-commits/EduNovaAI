<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova AI Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🎓 EduNova AI</h1>
    <p>Student Dashboard</p>
</header>

<section>

    <h2 id="welcome">Welcome 👋</h2>

    <p>Select a feature to continue your learning journey.</p>

    <hr>

    <h3>📈 Quick Stats</h3>

    <p>📚 Notes Available: 7+</p>
    <p>🤖 AI Chat: Ready</p>
    <p>📝 Mock Tests: Available</p>
    <p>🏆 Certificates: Enabled</p>
    <p>📊 Progress Tracking: Active</p>

    <hr>

    <a href="notes.html">
        <button>📚 AI Notes</button>
    </a>

    <br><br>

    <a href="quiz.html">
        <button>📝 Mock Test</button>
    </a>

    <br><br>

    <a href="aichat.html">
        <button>🤖 AI Doubt Solver</button>
    </a>

    <br><br>

    <button>📄 Previous Year Papers</button>

    <br><br>

    <a href="profile.html">
        <button>👤 Profile</button>
    </a>

    <br><br>

    <a href="certificate.html">
        <button>🏆 Certificate</button>
    </a>

    <br><br>

    <a href="progress.html">
        <button>📊 Progress</button>
    </a>

    <br><br>

    <a href="leaderboard.html">
        <button>🥇 Leaderboard</button>
    </a>

    <br><br>

    <a href="settings.html">
        <button>⚙️ Settings</button>
    </a>

    <br><br>

   <button onclick="firebaseLogout()">Logout</button> 

</section>

<footer>
    <p>© 2026 EduNova AI</p>
</footer>

<script src="script.js"></script>

<script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBv6tzSmI1ksTMdXo4FffSuU6WuUN-qeHg",
  authDomain: "edunova-ai-c1c3e.firebaseapp.com",
  projectId: "edunova-ai-c1c3e",
  storageBucket: "edunova-ai-c1c3e.firebasestorage.app",
  messagingSenderId: "545878851507",
  appId: "1:545878851507:web:5abbcbe85be52f17b9d5c6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    const ref = doc(db, "students", user.uid);
    const snap = await getDoc(ref);

    if (snap.exists()) {
        document.getElementById("welcome").innerHTML =
        "Welcome " + snap.data().name + " 👋";
    }

});

</script>
</script>

</body>
</html>

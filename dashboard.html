<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduNova AI Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🎓 EduNova AI</h1>
    <p>Student Dashboard</p>
</header>

<section>

    <h2 id="welcome">Welcome 👋</h2>

    <p>Select a feature to continue your learning journey.</p>

    <hr>

    <h3>📈 Quick Stats</h3>

    <p>📚 Notes Available: 7+</p>
    <p>🤖 AI Chat: Ready</p>
    <p>📝 Mock Tests: Available</p>
    <p>🏆 Certificates: Enabled</p>
    <p>📊 Progress Tracking: Active</p>

    <hr>

    <a href="notes.html">
        <button>📚 AI Notes</button>
    </a>

    <br><br>

    <a href="quiz.html">
        <button>📝 Mock Test</button>
    </a>

    <br><br>

    <a href="aichat.html">
        <button>🤖 AI Doubt Solver</button>
    </a>

    <br><br>

    <button>📄 Previous Year Papers</button>

    <br><br>

    <a href="profile.html">
        <button>👤 Profile</button>
    </a>

    <br><br>

    <a href="certificate.html">
        <button>🏆 Certificate</button>
    </a>

    <br><br>

    <a href="progress.html">
        <button>📊 Progress</button>
    </a>

    <br><br>

    <a href="leaderboard.html">
        <button>🥇 Leaderboard</button>
    </a>

    <br><br>

    <a href="settings.html">
        <button>⚙️ Settings</button>
    </a>

    <br><br>

    <button onclick="logout()">🚪 Logout</button>

</section>

<footer>
    <p>© 2026 EduNova AI</p>
</footer>

<script src="script.js"></script>

<script>
window.onload = function () {

    let name = localStorage.getItem("studentName");

    if (!name) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("welcome").innerHTML =
        "Welcome, " + name + " 👋";

}
</script>

</body>
</html>

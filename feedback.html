<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Feedback - EduNova AI</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<h1>⭐ Feedback</h1>

<p>Help us improve EduNova AI</p>

</header>

<section>

<div class="card">

<h2>Share Your Feedback</h2>

<input
type="text"
id="feedbackName"
placeholder="Your Name">

<br>

<input
type="email"
id="feedbackEmail"
placeholder="Your Email">

<br>

<select id="rating">

<option value="">⭐ Select Rating</option>

<option>⭐⭐⭐⭐⭐ Excellent</option>

<option>⭐⭐⭐⭐ Very Good</option>

<option>⭐⭐⭐ Good</option>

<option>⭐⭐ Average</option>

<option>⭐ Poor</option>

</select>

<br>

<textarea
id="feedbackMessage"
rows="6"
placeholder="Write your feedback..."></textarea>

<br><br>

<button onclick="submitFeedback()">

✅ Submit Feedback

</button>

<br><br>

<a href="dashboard.html">

<button>

🏠 Back to Dashboard

</button>

</a>

</div>

</section>

<footer>

<p>

© 2026 EduNova AI

</p>

</footer>

<script>

function submitFeedback(){

let name=document.getElementById("feedbackName").value.trim();

let email=document.getElementById("feedbackEmail").value.trim();

let rating=document.getElementById("rating").value;

let message=document.getElementById("feedbackMessage").value.trim();

if(name==""||email==""||rating==""||message==""){

alert("Please fill all fields.");

return;

}

let feedbacks=JSON.parse(localStorage.getItem("feedbacks"))||[];

feedbacks.push({

name:name,

email:email,

rating:rating,

message:message,

date:new Date().toLocaleString()

});

localStorage.setItem("feedbacks",JSON.stringify(feedbacks));

alert("🎉 Thank you for your feedback!");

document.getElementById("feedbackName").value="";

document.getElementById("feedbackEmail").value="";

document.getElementById("rating").value="";

document.getElementById("feedbackMessage").value="";

}

</script>

</body>
</html>

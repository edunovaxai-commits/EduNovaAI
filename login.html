<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EduNova AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🎓 EduNova AI</h1>
<p>Student Login</p>
</header>

<section>

<div class="card">

<h2>Welcome Back 👋</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<br>

<input
type="password"
id="password"
placeholder="Enter Password">

<br><br>

<button onclick="firebaseLogin()">🔐 Login</button>

<br><br>

<p>Don't have an account?</p>

<a href="signup.html">
<button type="button">📝 Create Account</button>
</a>

<br><br>

<button onclick="guestLogin()">👤 Continue as Guest</button>

</div>

</section>

<footer>
<p>© 2026 EduNova AI</p>
</footer>

<script>
function guestLogin(){
    localStorage.setItem("studentName","Guest");
    window.location.href="dashboard.html";
}
</script>

<script type="module" src="firebase.js"></script>

</body>
</html>
